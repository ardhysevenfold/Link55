<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wingo X7 Panel</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:#FFD700;
}

/* SPLIT */
.top{
    height:30vh;
    padding:8px;
    box-sizing:border-box;
}

.bottom{
    height:70vh;
}

.bottom iframe{
    width:100%;
    height:100%;
    border:none;
}

/* HEADER */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.periode{ font-size:14px; }
.timer{ font-size:24px; font-weight:bold; }

/* HASIL */
.hasil{
    font-size:40px;
    text-align:center;
    margin-top:3px;
}

.k{ color:#00BFFF; }
.b{ color:#FF4444; }

.flash{
    animation:blink 0.5s linear 6;
}

@keyframes blink{
    50%{ opacity:0; }
}

/* HISTORY */
.history{
    margin-top:5px;
    display:flex;
    justify-content:center;
    gap:4px;
    flex-wrap:wrap;
}

.history div{
    padding:3px 5px;
    border:1px solid #FFD700;
    border-radius:4px;
    font-size:11px;
}

/* 4 MINI TABLE */
.mini-tables{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    gap:5px;
}

.box{
    flex:1;
    border:1px solid #FFD700;
    border-radius:6px;
    text-align:center;
    padding:4px;
    font-size:11px;
}

.win{ color:#00FF88; }
.lose{ color:#FF4444; }

.blink{
    animation:blink 0.5s linear 6;
}
</style>
</head>
<body>

<div class="top">

    <div class="row">
        <div class="periode" id="periode">Periode: -</div>
        <div class="timer" id="timer">30</div>
    </div>

    <div class="hasil" id="hasil">-</div>

    <div class="history" id="history"></div>

    <div class="mini-tables">
        <div class="box" id="flashBox">-</div>
        <div class="box win">WIN<br><span id="winTotal">0</span></div>
        <div class="box lose">LOSE<br><span id="loseTotal">0</span></div>
        <div class="box">L.Streakx<br><span id="maxLose">0</span></div>
    </div>

</div>

<div class="bottom">
    <iframe src="https://example.com"></iframe>
</div>

<script>

let historyData = [];
let lastPeriode = null;

let winTotal = 0;
let loseTotal = 0;

let currentLoseStreak = 0;
let maxLoseStreak = 0;

/* ===================== */

function getPeriode(){
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset()*60000);
    const d = new Date(utc);

    const year = d.getUTCFullYear();
    const month = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');

    const totalSeconds =
        d.getUTCHours()*3600 +
        d.getUTCMinutes()*60 +
        d.getUTCSeconds();

    const period = Math.floor(totalSeconds/30);

    return `${year}${month}${day}${String(period).padStart(4,'0')}`;
}

function getRemaining(){
    const now = new Date();
    const sec = now.getUTCSeconds();
    return 30 - (sec % 30);
}

function generateResult(period){
    let seed = 0;
    for(let i=0;i<period.length;i++){
        seed += period.charCodeAt(i);
    }
    return seed % 10;
}

function addHistory(val){
    historyData.unshift(val);
    if(historyData.length > 10){
        historyData.pop();
    }

    const historyEl = document.getElementById("history");
    historyEl.innerHTML = "";

    historyData.forEach(item=>{
        const div = document.createElement("div");
        div.innerText = item;
        historyEl.appendChild(div);
    });
}

/* ===================== */
/* POLA PREDIKSI SEDERHANA */

function generatePrediction(){

    if(historyData.length < 5){
        return "K";
    }

    let kCount = 0;
    let bCount = 0;

    for(let i=0;i<5;i++){
        if(historyData[i].includes("K")) kCount++;
        else bCount++;
    }

    // jika 5 terakhir dominan K → prediksi B (lawan arus)
    if(kCount > bCount) return "B";
    else return "K";
}

/* ===================== */

function updateStats(isWin){

    const flashBox = document.getElementById("flashBox");

    if(isWin){
        winTotal++;
        currentLoseStreak = 0;
        flashBox.innerText = "WIN";
        flashBox.className = "box win blink";
    }else{
        loseTotal++;
        currentLoseStreak++;
        if(currentLoseStreak > maxLoseStreak){
            maxLoseStreak = currentLoseStreak;
        }
        flashBox.innerText = "LOSE";
        flashBox.className = "box lose blink";
    }

    document.getElementById("winTotal").innerText = winTotal;
    document.getElementById("loseTotal").innerText = loseTotal;
    document.getElementById("maxLose").innerText = maxLoseStreak;
}

/* ===================== */

function update(){

    const periode = getPeriode();
    const sisa = getRemaining();

    document.getElementById("periode").innerText = "Periode: " + periode;
    document.getElementById("timer").innerText = sisa;

    if(periode !== lastPeriode){
        lastPeriode = periode;

        const angka = generateResult(periode);
        const kategori = angka <= 4 ? "K" : "B";

        const hasilEl = document.getElementById("hasil");
        hasilEl.innerText = angka + " (" + kategori + ")";
        hasilEl.className = "hasil " + (kategori==="K"?"k":"b") + " flash";

        addHistory(angka + kategori);

        const prediksi = generatePrediction();

        const isWin = prediksi === kategori;

        updateStats(isWin);
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
